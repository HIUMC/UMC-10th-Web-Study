<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="nav-bar">
      <div class="logo">
        <div class="logo-icon">🐱</div>
        <span class="logo-text">Aido</span>
      </div>

      <nav class="nav-links">
        <a
          href="#"
          class="nav-link"
          data-ko="고양이 친구들"
          data-en="Cat Friends"
          >고양이 친구들</a
        >
        <a
          href="#"
          class="nav-link nav-link--active"
          data-ko="출시 알람 받기"
          data-en="Get Launch Alert"
          >출시 알람 받기</a
        >
      </nav>

      <div class="lang-toggle">
        <span class="lang-toggle__label" data-ko="언어" data-en="Language"
          >언어</span
        >
        <button
          class="lang-toggle__btn lang-toggle__btn--active"
          onclick="setLang('ko')"
        >
          KO
        </button>
        <button class="lang-toggle__btn" onclick="setLang('en')">EN</button>
      </div>
    </header>

    <script>
      function setLang(lang) {
        document.querySelectorAll(".lang-toggle__btn").forEach((btn) => {
          // 언어 토글 버튼 활성화 상태 업데이트
          btn.classList.toggle(
            "lang-toggle__btn--active",
            btn.textContent.trim().toLowerCase() === lang,
          );
        });

        // 네비게이션 링크 텍스트 변경
        document
          .querySelectorAll(".nav-link, .lang-toggle__label")
          .forEach((el) => {
            el.textContent = el.dataset[lang];
          });
      }
    </script>
  </body>
</html>
