<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aido Navbar Mission</title>
  <style>
    /* 1. 기본 스타일 초기화 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    /* 2. Navbar 레이아웃 (Flexbox 사용) */
    .navbar {
      display: flex;
      justify-content: space-between; /* 좌, 중, 우 간격 벌리기 */
      align-items: center;           /* 세로 중앙 정렬 */
      background-color: white;
      padding: 10px 20px;
      border: 2px solid #000;        /* 검정 테두리 */
      border-radius: 50px;           /* 알약 모양 디자인 */
      max-width: 1200px;
      margin: 0 auto;                /* 상단바 자체를 화면 중앙에 */
    }

    /* BEM: 로고 영역 */
    .navbar__logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .navbar__logo-img {
      width: 30px;
      height: 30px;
      background-color: #ff4d00; /* 임시 로고 색상 */
      border-radius: 8px;
    }

    /* BEM: 메뉴 영역 */
    .navbar__menu {
      display: flex;
      list-style: none;
      gap: 30px;
      color: #555;
      font-size: 0.9rem;
    }

    /* BEM: 옵션(언어) 영역 */
    .navbar__options {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1.5px solid #ccc;
      padding: 4px;
      border-radius: 30px;
    }

    .navbar__btn-lang {
      border: none;
      background: none;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: bold;
      color: #999;
    }

    /* 현재 활성화된 언어 표시 (Modifier) */
    .navbar__btn-lang--active {
      background-color: #ff4d00;
      color: white;
      border-radius: 20px;
    }

    /* 3. 반응형 디자인 (Media Query) */
    @media (max-width: 768px) {
      /* 화면이 768px보다 작아지면 메뉴 글자 숨기기 */
      .navbar__menu {
        display: none;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">
      <div class="navbar__logo-img"></div>
      <span>Aido</span>
    </div>

    <ul class="navbar__menu">
      <li>고양이 친구들</li>
      <li style="color: #ff4d00; font-weight: bold;">출시 알림 받기</li>
    </ul>

    <div class="navbar__options">
      <button class="navbar__btn-lang navbar__btn-lang--active">KO</button>
      <button class="navbar__btn-lang">EN</button>
    </div>
  </nav>

  <div style="text-align: center; margin-top: 50px;">
    <h2>브라우저 창 너비를 줄여보자!</h2>
    <p>768px 이하가 되면 중앙 메뉴가 사라짐.</p>
  </div>

</body>
</html>
