<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YONG TODO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-app">
        <h1 class="todo-app__title">YONG TODO</h1>
        
        <form class="todo-app__form" id="todo-form">
            <input type="text" class="todo-app__input" id="todo-input" placeholder="할 일 입력" required>
            <button type="submit" class="todo-app__submit-btn">할 일 추가</button>
        </form>

        <div class="todo-app__container">
            <section class="todo-list">
                <h2 class="todo-list__title">할 일</h2>
                <ul class="todo-list__items" id="pending-list"></ul>
            </section>

            <section class="todo-list">
                <h2 class="todo-list__title">완료</h2>
                <ul class="todo-list__items" id="completed-list"></ul>
            </section>
        </div>
    </div>
    <script type="module" src="../dist/main.js"></script>
</body>
</html>
